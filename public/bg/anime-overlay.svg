<svg width="100%" height="100%" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <defs>
    <radialGradient id="animeGlow" cx="50%" cy="50%" r="80%" fx="50%" fy="50%" gradientTransform="rotate(20)">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#23232b" stop-opacity="0"/>
    </radialGradient>
    <pattern id="animeStars" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1.5" fill="#fff" fill-opacity="0.18"/>
      <circle cx="10" cy="50" r="1" fill="#f472b6" fill-opacity="0.12"/>
      <circle cx="50" cy="10" r="1" fill="#7c3aed" fill-opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="1440" height="900" fill="url(#animeGlow)"/>
  <rect width="1440" height="900" fill="url(#animeStars)"/>
